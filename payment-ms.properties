server.port=8084

spring.datasource.url=jdbc:mysql://localhost:3306/payment-ms?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Feign Client
spring.cloud.openfeign.circuitbreaker.enabled=true

# Circuit Breaker (Order-MS)
resilience4j.circuitbreaker.instances.order-service.slidingWindowSize=10
resilience4j.circuitbreaker.instances.order-service.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.order-service.failureRateThreshold=50
resilience4j.circuitbreaker.instances.order-service.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.order-service.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.instances.order-service.automaticTransitionFromOpenToHalfOpenEnabled=true

# Retry (Order-MS)
resilience4j.retry.instances.order-service.maxAttempts=3
resilience4j.retry.instances.order-service.waitDuration=2s


management.endpoints.web.exposure.include=health,info,circuitbreakers,circuitbreakerevents,retries,retryevents

management.endpoint.health.show-details=always
